server:
  port: 8082

spring:
  application:
    name: CUSTOMS-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/customs_db
    username: postgres
    password: Umid/4709.
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true


feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000