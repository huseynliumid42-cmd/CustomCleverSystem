server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # Server özü-özünü qeydiyyata almamalıdır
    register-with-eureka: false
    # Özündən məlumatları çəkməyə ehtiyac yoxdur
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Boş qeydiyyatları təmizləmə intervalı (opsional)
    eviction-interval-timer-in-ms: 10000