<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Köməkçi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>AI Köməkçi</h2>

<div class="container">
    <input id="msg" placeholder="Sual yaz"><br><br>
    <button onclick="send()">Göndər</button>

    <p id="response"></p>
</div>

<a href="index.html" class="back">⬅ Geri</a>

<script>
    function send() {
        const message = document.getElementById("msg").value;

        fetch("http://localhost:8060/api/ai/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        })
            .then(async res => {
                const text = await res.text();   // 🔥 hər şeyi tutur

                try {
                    const json = JSON.parse(text);
                    return json.response || text;
                } catch (e) {
                    return text; // JSON deyilsə belə göstər
                }
            })
            .then(data => {
                document.getElementById("response").innerText = data;
            })
            .catch(err => {
                console.error(err);
                document.getElementById("response").innerText = "Serverə qoşulmaq mümkün olmadı";
            });
    }
</script>

</body>
</html>
