server:
  port: 8060

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ai-service
          uri: lb://AIINTEGRATIONSERVICE
          predicates:
            - Path=/api/ai/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost