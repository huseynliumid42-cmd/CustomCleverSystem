server:
  port: 8060

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: customs-service
          uri: lb://customs-service
          predicates:
            - Path=/api/customs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/