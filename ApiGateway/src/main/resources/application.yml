server:
  port: 8060

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      routes:
        - id: ai-service
          uri:  http://localhost:8084
          predicates:
            - Path=/api/ai/**

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: currency-service
          uri:  http://localhost:8083
          predicates:
            - Path=/api/currency/**

        - id: custom-service
          uri:  http://localhost:8082
          predicates:
            - Path=/api/v1/customs/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost